<div class="container">
  <header class="header">
    <h1>🗳️ Secure Multi-Election Voting System</h1>
    <p>Select an election to view the dashboard and cast your vote.</p>
  </header>

  <div class="election-selector card">
    <label for="electionType"><strong>Select Active Election:</strong></label>
    <select id="electionType" [(ngModel)]="activeElection" (change)="loadLeaderboard()">
      <option value="" disabled selected>-- Choose an Election --</option>
      <option value="Staff">Staff Welfare Election</option>
      <option value="Student">Campus Student Council</option>
      <option value="Resident">Kilimani Residents Association</option>
    </select>
  </div>

  <div *ngIf="message" class="alert"
    [ngClass]="{'alert-success': message.includes('✅'), 'alert-info': message.includes('ℹ️'), 'alert-error': message.includes('❌')}">
    {{ message }}
  </div>

  <div class="grid" *ngIf="activeElection">

    <div class="voting-panel card">
      <h2>Cast Your Vote</h2>

      <div class="form-group">
        <label>1. Select Your Identity</label>
        <select [(ngModel)]="selectedVoterId">
          <option value="0" disabled selected>-- Who are you? --</option>
          <option *ngFor="let voter of filteredVoters" [value]="voter.id">
            {{ voter.name }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>2. Select Position</label>
        <select [(ngModel)]="selectedPositionId">
          <option value="0" disabled selected>-- Position --</option>
          <option *ngFor="let pos of filteredPositions" [value]="pos.id">
            {{ pos.name }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>3. Select Candidate</label>
        <select [(ngModel)]="selectedCandidateId">
          <option value="0" disabled selected>-- Candidate --</option>
          <option *ngFor="let cand of filteredCandidates" [value]="cand.id">
            {{ cand.name }}
          </option>
        </select>
      </div>

      <button class="btn-submit" (click)="submitVote()"
        [disabled]="!selectedVoterId || !selectedCandidateId || !selectedPositionId">
        Securely Cast Vote
      </button>
    </div>

    <div class="leaderboard-panel card">
      <h2>Live Leaderboard</h2>
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>Position</th>
            <th>Candidate</th>
            <th>Total Votes</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="leaderboard.length === 0">
            <td colspan="3" class="text-center">No votes cast yet.</td>
          </tr>
          <tr *ngFor="let row of leaderboard; let i = index">
            <td><strong>{{ row.position }}</strong></td>
            <td>{{ row.candidateName }}</td>
            <td class="vote-count">{{ row.totalVotes }}</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
